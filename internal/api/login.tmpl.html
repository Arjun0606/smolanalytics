<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>sign in · smolanalytics</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 32 32%27%3E%3Crect width=%2732%27 height=%2732%27 rx=%276%27 fill=%27%23F5A623%27/%3E%3Ctext x=%2716%27 y=%2723%27 font-size=%2720%27 text-anchor=%27middle%27 fill=%27%230A0A0A%27 font-family=%27monospace%27 font-weight=%27bold%27%3Es%3C/text%3E%3C/svg%3E">
<style>
  :root{--bg:#0A0A0A;--surface:#161616;--surface2:#1C1C1C;--line:#262626;--fg:#FAFAFA;--mut:#8E8E8E;--mut2:#6A6A6A;--accent:#F5A623;--warn:#E5544B;
    --mono:ui-monospace,"JetBrains Mono",SFMono-Regular,Menlo,monospace;--sans:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);color:var(--fg);font-family:var(--sans)}
  .box{width:340px;background:var(--surface);border:1px solid var(--line);padding:28px}
  .logo{font-weight:800;letter-spacing:-.02em;font-size:18px;margin-bottom:4px}
  .logo b{color:var(--accent)}
  .sub{color:var(--mut);font-size:13px;margin-bottom:22px}
  label{display:block;font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--mut);margin-bottom:8px}
  input{width:100%;background:var(--surface2);border:1px solid var(--line);color:var(--fg);font-family:var(--mono);font-size:14px;padding:11px 13px;outline:none}
  input:focus{border-color:var(--accent)}
  button{width:100%;margin-top:16px;background:var(--accent);color:#0A0A0A;border:none;font-weight:700;padding:11px;cursor:pointer;font-family:var(--mono);font-size:13px}
  .err{color:var(--warn);font-size:12px;margin-top:12px;font-family:var(--mono)}
</style>
</head>
<body>
  <form class="box" method="post" action="/login">
    <div class="logo">smol<b>analytics</b></div>
    <div class="sub">{{.Project}}</div>
    <label for="pw">password</label>
    <input id="pw" name="password" type="password" autofocus autocomplete="current-password">
    <button type="submit">Sign in</button>
    {{if .Error}}<div class="err">incorrect password</div>{{end}}
  </form>
</body>
</html>
