<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>sign in · smolanalytics</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 32 32%27%3E%3Crect width=%2732%27 height=%2732%27 rx=%276%27 fill=%27%23F5A623%27/%3E%3Ctext x=%2716%27 y=%2723%27 font-size=%2720%27 text-anchor=%27middle%27 fill=%27%230A0A0A%27 font-family=%27monospace%27 font-weight=%27bold%27%3Es%3C/text%3E%3C/svg%3E">
<style>
  :root{--bg:#0A0A0A;--surface:#161616;--surface2:#1C1C1C;--line:#262626;--line2:#303030;--fg:#FAFAFA;--mut:#8E8E8E;--mut2:#6A6A6A;--accent:#F5A623;--accent2:#FFB84D;--warn:#E5544B;
    --mono:ui-monospace,"JetBrains Mono",SFMono-Regular,Menlo,monospace;--sans:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);color:var(--fg);font-family:var(--sans);overflow:hidden}
  .glow{position:fixed;top:50%;left:50%;transform:translate(-50%,-58%);width:720px;height:420px;background:radial-gradient(ellipse at center,rgba(245,166,35,.10),transparent 60%);pointer-events:none;filter:blur(6px)}
  .box{position:relative;width:340px;background:var(--surface);border:1px solid var(--line);padding:28px;animation:rise .28s cubic-bezier(.2,.7,.3,1) both}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion: reduce){.box{animation:none}}
  .logo{font-weight:800;letter-spacing:-.02em;font-size:18px;margin-bottom:4px}
  .logo b{color:var(--accent)}
  .sub{color:var(--mut);font-size:13px;margin-bottom:22px}
  label{display:block;font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--mut);margin-bottom:8px}
  input{width:100%;background:var(--surface2);border:1px solid {{if .Error}}var(--warn){{else}}var(--line){{end}};color:var(--fg);font-family:var(--mono);font-size:14px;padding:11px 13px;outline:none;transition:border-color .15s, box-shadow .15s}
  input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(245,166,35,.12)}
  button{width:100%;margin-top:16px;background:var(--accent);color:#0A0A0A;border:1px solid var(--accent);font-weight:700;padding:11px;cursor:pointer;font-family:var(--mono);font-size:13px;transition:background .15s,border-color .15s}
  button:hover{background:var(--accent2);border-color:var(--accent2)}
  button:focus-visible{outline:2px solid var(--accent2);outline-offset:2px}
  .err{color:var(--warn);font-size:12px;margin-top:12px;font-family:var(--mono)}
  .hint{color:var(--mut2);font-size:11.5px;margin-top:18px;line-height:1.5}
  .hint code{font-family:var(--mono);color:var(--mut)}
</style>
</head>
<body>
  <div class="glow"></div>
  <form class="box" method="post" action="/login">
    <div class="logo">smol<b>analytics</b></div>
    <div class="sub">{{.Project}}</div>
    <label for="pw">password</label>
    <input id="pw" name="password" type="password" autofocus autocomplete="current-password" {{if .Error}}aria-invalid="true" aria-describedby="err"{{end}}>
    <button type="submit">Sign in</button>
    {{if .RateLimited}}<div class="err" id="err" role="alert">too many attempts — wait a few minutes and try again</div>
    {{else if .Error}}<div class="err" id="err" role="alert">incorrect password — try again</div>{{end}}
    <div class="hint">self-hosting and lost it? it's your <code>SMOLANALYTICS_PASSWORD</code> env var, or reset it in settings from the box it runs on.</div>
  </form>
</body>
</html>
