# Publishes server.json to the official MCP registry on every release.
# Auth is GitHub Actions OIDC — validates the io.github.* namespace without secrets.
name: mcp-registry
on:
  release:
    types: [published]
  workflow_dispatch:
permissions:
  id-token: write
  contents: read
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/').tar.gz" | tar xz mcp-publisher
      - name: publish
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish
