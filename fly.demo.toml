app = "smolanalytics-demo"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  ADDR = "0.0.0.0:8080"

[processes]
  app = "demo"

[http_service]
  internal_port = 8080
  processes = ["app"]
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  # The public demo is the single most-watched surface (the "see it live" CTA + homepage ask
  # box). Keep one machine always warm so it never cold-starts blank in front of a visitor.
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "5s"
    interval = "15s"
    method = "GET"
    path = "/healthz"
    timeout = "2s"
