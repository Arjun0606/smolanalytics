app = "smolanalytics-demo"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  ADDR = "0.0.0.0:8080"

[processes]
  app = "demo"

[http_service]
  internal_port = 8080
  processes = ["app"]
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "5s"
    interval = "15s"
    method = "GET"
    path = "/healthz"
    timeout = "2s"
